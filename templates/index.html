<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="RetailVibe — your AI-powered in-store shopping assistant. Describe what you want to make or buy and get an instant, aisle-mapped checklist.">
    <title>RetailVibe - Smart In-Store Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #8b5cf6;
            --primary-hover: #7c3aed;
            --secondary: #ec4899;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --focus-ring: 0 0 0 3px rgba(139, 92, 246, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        /* Visible focus rings for keyboard navigation */
        :focus-visible {
            outline: none;
            box-shadow: var(--focus-ring);
            border-radius: 8px;
        }

        /* Skip-to-content link for screen readers */
        .skip-link {
            position: absolute;
            top: -100%;
            left: 1rem;
            background: var(--primary);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0 0 8px 8px;
            font-weight: 600;
            z-index: 1000;
            text-decoration: none;
            transition: top 0.2s;
        }
        .skip-link:focus {
            top: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(236, 72, 153, 0.15), transparent 25%);
            background-attachment: fixed;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            margin-top: 4rem;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Visually hidden label for screen readers */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .search-box {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 0.5rem;
            display: flex;
            align-items: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: rgba(139, 92, 246, 0.5);
            box-shadow: 0 8px 32px rgba(139, 92, 246, 0.2);
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.1rem;
            padding: 1rem 1.5rem;
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 20px;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: white;
            font-size: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .search-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4);
        }

        .results-container {
            margin-top: 3rem;
            display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .checklist {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .checklist-item {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .checklist-item:hover {
            background: rgba(40, 53, 76, 0.8);
            transform: translateX(5px);
        }

        .item-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid var(--primary);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .checklist-item.checked .checkbox {
            background: var(--primary);
        }

        .checklist-item.checked .checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .checklist-item.checked .item-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 500;
            transition: color 0.2s;
        }

        .item-aisle {
            background: rgba(139, 92, 246, 0.2);
            color: #d8b4fe;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            white-space: nowrap;
        }

        .cross-sell-card {
            background: linear-gradient(135deg, rgba(236, 72, 153, 0.1), rgba(139, 92, 246, 0.1));
            backdrop-filter: blur(12px);
            border: 1px solid rgba(236, 72, 153, 0.3);
            border-radius: 20px;
            padding: 2rem;
            position: relative;
            overflow: hidden;
        }

        .cross-sell-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(to bottom, var(--secondary), var(--primary));
        }

        .cross-sell-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--secondary);
            font-weight: 600;
            margin-bottom: 1rem;
        }

        .cross-sell-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .cross-sell-reason {
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 1rem;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 3rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error state */
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            text-align: center;
        }

        /* Suggestions */
        .suggestions-container {
            margin-top: 2rem;
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        .suggestions-title {
            font-size: 1rem;
            color: var(--text-muted);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-weight: 500;
        }

        .suggestion-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            justify-content: center;
        }

        .suggestion-chip {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            backdrop-filter: blur(8px);
        }

        .suggestion-chip:hover {
            background: rgba(139, 92, 246, 0.2);
            border-color: rgba(139, 92, 246, 0.5);
            transform: translateY(-2px);
        }

        /* History chip label pill */
        .chip-history-badge {
            font-size: 0.7rem;
            background: rgba(139, 92, 246, 0.3);
            color: #d8b4fe;
            padding: 0.1rem 0.4rem;
            border-radius: 8px;
            margin-left: 0.3rem;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <!-- Skip navigation link for keyboard / screen-reader users -->
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <div class="container" role="main" id="main-content">
        <header>
            <h1>RetailVibe</h1>
            <p class="subtitle">Your AI-Powered In-Store Shopping Assistant</p>
        </header>

        <!-- Search form with accessible label -->
        <section aria-label="Shopping assistant search">
            <label for="query-input" class="sr-only">What do you want to shop for or cook today?</label>
            <form id="search-form" class="search-box" role="search" aria-label="Shopping query">
                <input
                    type="text"
                    id="query-input"
                    class="search-input"
                    placeholder="e.g. Ingredients for a gluten-free lasagna and a wine..."
                    autocomplete="off"
                    aria-required="true"
                    aria-label="Describe what you want to make or buy"
                    required
                >
                <button
                    type="submit"
                    class="search-btn"
                    id="search-btn"
                    aria-label="Generate shopping list"
                >
                    <i class="ph ph-sparkle" aria-hidden="true"></i>
                </button>
            </form>
        </section>

        <!-- Recently Bought & Suggestions -->
        <section id="suggestions" class="suggestions-container" aria-label="Recently bought and suggested items">
            <h2 class="suggestions-title">
                <i class="ph ph-clock-counter-clockwise" aria-hidden="true"></i>
                Recently Bought &amp; Suggestions
            </h2>
            <div class="suggestion-chips" id="chips-container" role="list" aria-label="Quick search suggestions">
                <!-- Populated by JS from /api/history + defaults -->
            </div>
        </section>

        <!-- Status / error feedback region (aria-live for screen readers) -->
        <div
            id="error-box"
            class="error-message"
            role="status"
            aria-live="polite"
            aria-atomic="true"
        ></div>

        <!-- Loading indicator -->
        <div id="loading" class="loading" aria-live="polite" aria-busy="false" aria-label="Loading shopping list">
            <div class="spinner" aria-hidden="true"></div>
            <p>Curating your perfect shopping list...</p>
        </div>

        <!-- Results (aria-live so screen readers announce new content) -->
        <div
            id="results"
            class="results-container"
            aria-live="polite"
            aria-atomic="false"
            aria-label="Shopping results"
        >
            <h2 class="section-title">
                <i class="ph ph-shopping-cart" aria-hidden="true"></i>
                Your Shopping List
            </h2>
            <ul id="checklist" class="checklist" aria-label="Shopping items checklist">
                <!-- Items injected by JS -->
            </ul>

            <h2 class="section-title">
                <i class="ph ph-star" aria-hidden="true"></i>
                Perfect Pairing
            </h2>
            <div
                class="cross-sell-card"
                id="cross-sell"
                aria-label="Recommended complementary item"
            >
                <!-- Cross-sell injected by JS -->
            </div>
        </div>
    </div>

    <script>
        // ---------------------------------------------------------------------------
        // Session ID — stable per browser tab for Firestore keying
        // ---------------------------------------------------------------------------
        const SESSION_ID = (() => {
            let id = sessionStorage.getItem('rv_session');
            if (!id) {
                id = 'rv-' + Math.random().toString(36).slice(2, 10);
                sessionStorage.setItem('rv_session', id);
            }
            return id;
        })();

        // ---------------------------------------------------------------------------
        // Default suggestion chips (shown before history loads)
        // ---------------------------------------------------------------------------
        const DEFAULT_CHIPS = [
            { label: '🥛 Oat Milk',         query: 'Oat Milk' },
            { label: '🥑 Avocado',           query: 'Avocado' },
            { label: '🍞 Sourdough Bread',   query: 'Sourdough Bread' },
            { label: '🥚 Organic Eggs',      query: 'Organic Eggs' },
            { label: '🍝 Pasta Ingredients', query: 'Pasta Ingredients' },
            { label: '🍕 Pizza Night',       query: 'Pizza Night' },
            { label: '🥗 Salad Bowl',        query: 'Salad Bowl' },
        ];

        // DOM refs
        const form               = document.getElementById('search-form');
        const input              = document.getElementById('query-input');
        const resultsContainer   = document.getElementById('results');
        const loadingIndicator   = document.getElementById('loading');
        const checklist          = document.getElementById('checklist');
        const crossSellContainer = document.getElementById('cross-sell');
        const errorBox           = document.getElementById('error-box');
        const suggestionsSection = document.getElementById('suggestions');
        const chipsContainer     = document.getElementById('chips-container');

        // ---------------------------------------------------------------------------
        // Render chips
        // ---------------------------------------------------------------------------
        function renderChips(historyItems = []) {
            chipsContainer.innerHTML = '';

            // History chips (real data from Firestore/memory)
            historyItems.forEach(query => {
                addChip(`🕐 ${query}`, query, true);
            });

            // Default chips (exclude any already in history)
            DEFAULT_CHIPS.forEach(({ label, query }) => {
                if (!historyItems.some(h => h.toLowerCase() === query.toLowerCase())) {
                    addChip(label, query, false);
                }
            });
        }

        function addChip(label, query, isHistory) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'suggestion-chip';
            btn.setAttribute('role', 'listitem');
            btn.setAttribute('aria-label', `Search for: ${query}`);
            btn.innerHTML = label + (isHistory
                ? '<span class="chip-history-badge" aria-label="Recently bought">recent</span>'
                : '');
            btn.addEventListener('click', () => {
                input.value = query;
                form.dispatchEvent(new Event('submit', { cancelable: true, bubbles: true }));
            });
            chipsContainer.appendChild(btn);
        }

        // ---------------------------------------------------------------------------
        // Load history from backend on page load
        // ---------------------------------------------------------------------------
        async function loadHistory() {
            try {
                const resp = await fetch(`/api/history?session_id=${encodeURIComponent(SESSION_ID)}`);
                if (resp.ok) {
                    const data = await resp.json();
                    renderChips(data.history || []);
                    return;
                }
            } catch (_) { /* fall through */ }
            renderChips([]);
        }

        loadHistory();

        // ---------------------------------------------------------------------------
        // Form submission
        // ---------------------------------------------------------------------------
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const query = input.value.trim();
            if (!query) return;

            // Reset UI
            resultsContainer.style.display = 'none';
            suggestionsSection.style.display = 'none';
            errorBox.style.display = 'none';
            errorBox.textContent = '';
            loadingIndicator.style.display = 'block';
            loadingIndicator.setAttribute('aria-busy', 'true');
            document.getElementById('search-btn').setAttribute('aria-disabled', 'true');

            try {
                const response = await fetch('/api/shopping-list', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, session_id: SESSION_ID }),
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Failed to generate shopping list');
                }

                renderResults(data);

                // Refresh chips with updated history
                await loadHistory();

            } catch (error) {
                console.error('Error:', error);
                errorBox.textContent = error.message;
                errorBox.style.display = 'block';
                // Restore suggestions on error
                suggestionsSection.style.display = 'block';
            } finally {
                loadingIndicator.style.display = 'none';
                loadingIndicator.setAttribute('aria-busy', 'false');
                document.getElementById('search-btn').removeAttribute('aria-disabled');
            }
        });

        // ---------------------------------------------------------------------------
        // Render results
        // ---------------------------------------------------------------------------
        function renderResults(data) {
            // Checklist
            checklist.innerHTML = '';
            const items = data.items && Array.isArray(data.items) ? data.items : [];

            if (items.length === 0) {
                checklist.innerHTML = '<li class="checklist-item" role="listitem">No items found.</li>';
            } else {
                items.forEach((item) => {
                    const li = document.createElement('li');
                    li.className = 'checklist-item';
                    li.setAttribute('role', 'listitem');
                    li.setAttribute('aria-label', `${item.name || 'Item'}, found in ${item.aisle || 'unknown aisle'}. Click to mark as collected.`);
                    li.setAttribute('tabindex', '0');
                    li.innerHTML = `
                        <div class="item-left">
                            <div class="checkbox" aria-hidden="true"></div>
                            <span class="item-name">${escapeHtml(item.name || 'Unknown Item')}</span>
                        </div>
                        <span class="item-aisle">
                            <i class="ph ph-map-pin" aria-hidden="true"></i>
                            ${escapeHtml(item.aisle || 'Unknown Aisle')}
                        </span>
                    `;

                    const toggle = () => {
                        const checked = li.classList.toggle('checked');
                        li.setAttribute(
                            'aria-label',
                            `${item.name}, ${item.aisle}. ${checked ? 'Collected' : 'Not yet collected'}. Click to toggle.`
                        );
                    };
                    li.addEventListener('click', toggle);
                    li.addEventListener('keydown', (ev) => {
                        if (ev.key === 'Enter' || ev.key === ' ') { ev.preventDefault(); toggle(); }
                    });

                    checklist.appendChild(li);
                });
            }

            // Cross-sell
            if (data.cross_sell) {
                const cs = data.cross_sell;
                crossSellContainer.innerHTML = `
                    <div class="cross-sell-header">
                        <i class="ph-fill ph-lightbulb" aria-hidden="true"></i>
                        Recommended Addition
                    </div>
                    <div class="cross-sell-name">${escapeHtml(cs.name || '')}</div>
                    <div class="cross-sell-reason">${escapeHtml(cs.reason || '')}</div>
                    <div class="item-aisle" style="display:inline-block;margin-top:0.5rem;">
                        <i class="ph ph-map-pin" aria-hidden="true"></i>
                        ${escapeHtml(cs.aisle || '')}
                    </div>
                `;
            } else {
                crossSellContainer.innerHTML = '<div>No cross-sell recommendation available.</div>';
            }

            resultsContainer.style.display = 'block';
            suggestionsSection.style.display = 'block';

            // Move focus to results heading for screen readers
            const heading = resultsContainer.querySelector('.section-title');
            if (heading) { heading.setAttribute('tabindex', '-1'); heading.focus(); }
        }

        // ---------------------------------------------------------------------------
        // Utility: escape user-supplied strings before inserting into DOM
        // ---------------------------------------------------------------------------
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }
    </script>
</body>
</html>
